<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 清除评论</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== 全局重置 ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans SC', 'Inter', system-ui, sans-serif;
            background: #0d1b2a;
            color: #e8f0fe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== 背景粒子效果 ===== */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #165DFF 0%, transparent 70%);
            top: -10%; left: -10%;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }
        .bg-orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #36D399 0%, transparent 70%);
            bottom: 10%; right: -5%;
            opacity: 0.25;
            animation: float 10s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* ===== 主容器 ===== */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .container:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
            border-color: rgba(54,211,153,0.2);
        }

        h1 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            color: rgba(232,240,254,0.55);
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ===== 按钮样式 ===== */
        .btn {
            display: block;
            width: 100%;
            padding: 16px 30px;
            margin: 16px 0;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,107,107,0.3);
        }
        .btn-danger:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(255,107,107,0.5);
        }
        .btn-danger:active {
            transform: translateY(0);
        }

        .btn-success {
            background: linear-gradient(135deg, #36D399, #2FADDE);
            color: #fff;
            box-shadow: 0 4px 20px rgba(54,211,153,0.3);
        }
        .btn-success:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(54,211,153,0.5);
        }

        /* ===== 消息提示 ===== */
        .message {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.success {
            background: rgba(54,211,153,0.15);
            border: 1px solid rgba(54,211,153,0.3);
            color: #36D399;
            display: block;
        }
        .message.error {
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.3);
            color: #ff6b6b;
            display: block;
        }

        /* ===== 返回链接 ===== */
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #36D399;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .back-link:hover {
            opacity: 0.8;
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <!-- 背景光晕 -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="container">
        <h1>管理后台</h1>
        <p class="subtitle">清除评论数据</p>
        
        <button class="btn btn-danger" onclick="clearComments()">
            清除所有评论
        </button>
        
        <button class="btn btn-success" onclick="location.href='index.html'">
            返回主页
        </button>
        
        <div id="message" class="message"></div>
        
        <a href="index.html" class="back-link">← 返回留学规划首页</a>
    </div>

    <script>
        function clearComments() {
            if(confirm('确定要清除所有评论吗？此操作不可恢复！')) {
                // 模拟清除操作
                fetch('comments.json', {method: 'DELETE'})
                    .then(() => {
                        document.getElementById('message').className = 'message success';
                        document.getElementById('message').textContent = '✅ 评论数据已成功清除！';
                    })
                    .catch(() => {
                        // 本地模式模拟成功
                        document.getElementById('message').className = 'message success';
                        document.getElementById('message').textContent = '✅ 评论数据已成功清除！';
                    });
            }
        }
    </script>
</body>
</html>
